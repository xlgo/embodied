<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="水墨揭示效果 — 鼠标划过，敦煌壁画从水墨中浮现">
  <title>水墨敦煌 · 墨韵揭影</title>
  <style>
    /* ========== Reset & Base ========== */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap');

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #fff;
      font-family: 'Noto Serif SC', serif;
      cursor: none; /* hide default cursor */
    }

    /* The background image layer — always behind everything */
    #bg-layer {
      position: fixed;
      inset: 0;
      background: url('./dunhuang_bg.png') center/cover no-repeat;
      z-index: 1;
    }

    /* Canvas overlay that masks the image with white */
    #ink-canvas {
      position: fixed;
      inset: 0;
      z-index: 2;
    }

    /* Custom brush cursor */
    #brush-cursor {
      position: fixed;
      width: 40px;
      height: 40px;
      pointer-events: none;
      z-index: 100;
      transform: translate(-50%, -50%);
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    #brush-cursor.visible {
      opacity: 1;
    }
    #brush-cursor svg {
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 0 4px rgba(0,0,0,0.15));
    }

    /* Hint text */
    #hint {
      position: fixed;
      bottom: 48px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 50;
      color: #8b7355;
      font-size: 16px;
      letter-spacing: 6px;
      opacity: 0.7;
      pointer-events: none;
      animation: hintPulse 3s ease-in-out infinite;
      text-shadow: 0 1px 2px rgba(0,0,0,0.08);
      transition: opacity 0.8s ease;
    }
    #hint.hidden {
      opacity: 0;
    }

    @keyframes hintPulse {
      0%, 100% { opacity: 0.7; }
      50% { opacity: 0.3; }
    }

    /* Title in top-left */
    #title {
      position: fixed;
      top: 36px;
      left: 48px;
      z-index: 50;
      pointer-events: none;
    }
    #title h1 {
      font-size: 28px;
      font-weight: 700;
      color: #5a4a3a;
      letter-spacing: 8px;
      opacity: 0.35;
      transition: opacity 0.6s ease;
    }
    #title .sub {
      font-size: 13px;
      color: #9b8b7a;
      letter-spacing: 4px;
      margin-top: 6px;
      opacity: 0.3;
      transition: opacity 0.6s ease;
    }
    body:hover #title h1 { opacity: 0.6; }
    body:hover #title .sub { opacity: 0.5; }

    /* Ink splash particles (decorative) */
    .ink-particle {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 3;
      background: radial-gradient(circle, rgba(30,30,30,0.15) 0%, transparent 70%);
      animation: inkFade 1.2s ease-out forwards;
    }
    @keyframes inkFade {
      0% { transform: scale(0.3); opacity: 0.6; }
      50% { transform: scale(1); opacity: 0.3; }
      100% { transform: scale(1.5); opacity: 0; }
    }
  </style>
</head>
<body>
  <!-- Background image layer -->
  <div id="bg-layer"></div>

  <!-- Canvas: starts fully white, mouse reveals image beneath -->
  <canvas id="ink-canvas"></canvas>

  <!-- Custom brush cursor -->
  <div id="brush-cursor">
    <svg viewBox="0 0 100 100" fill="none">
      <circle cx="50" cy="50" r="30" stroke="#5a4a3a" stroke-width="1.5" fill="none" opacity="0.5"/>
      <circle cx="50" cy="50" r="8" fill="#5a4a3a" opacity="0.3"/>
      <line x1="50" y1="18" x2="50" y2="10" stroke="#5a4a3a" stroke-width="1" opacity="0.3"/>
      <line x1="50" y1="82" x2="50" y2="90" stroke="#5a4a3a" stroke-width="1" opacity="0.3"/>
      <line x1="18" y1="50" x2="10" y2="50" stroke="#5a4a3a" stroke-width="1" opacity="0.3"/>
      <line x1="82" y1="50" x2="90" y2="50" stroke="#5a4a3a" stroke-width="1" opacity="0.3"/>
    </svg>
  </div>

  <!-- Title -->
  <div id="title">
    <h1>墨韵敦煌</h1>
    <div class="sub">移动鼠标，揭开千年色彩</div>
  </div>

  <!-- Hint -->
  <div id="hint">移 动 鼠 标 · 挥 毫 泼 墨</div>

  <script>
    // ========== Configuration ==========
    const CONFIG = {
      brushRadius: 60,          // base brush radius
      brushSoftness: 0.4,       // edge softness (0-1)
      inkSpread: 12,            // random ink splatter offset
      inkDots: 5,               // splatter sub-dots per stroke
      fadeSpeed: 3,             // white restore speed (alpha per frame, 0-255)
      fadeDelay: 1200,          // ms of inactivity before fade starts
      trailLength: 6,          // interpolation points between mouse samples
      particleChance: 0.15,    // chance of decorative particle per move
    };

    // ========== Canvas Setup ==========
    const canvas = document.getElementById('ink-canvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    const cursor = document.getElementById('brush-cursor');
    const hint = document.getElementById('hint');

    let W, H;
    let mouseX = -999, mouseY = -999;
    let prevX = -999, prevY = -999;
    let isMouseInside = false;
    let lastMoveTime = 0;
    let isFading = false;
    let fadeStartTime = 0;
    let hasInteracted = false;

    function resize() {
      W = window.innerWidth;
      H = window.innerHeight;
      canvas.width = W;
      canvas.height = H;
      fillWhite();
    }

    function fillWhite() {
      ctx.globalCompositeOperation = 'source-over';
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, W, H);
    }

    window.addEventListener('resize', resize);
    resize();

    // ========== Ink Brush Stroke ==========

    // Create an ink brush stamp (a soft, irregular circle)
    function drawInkDot(x, y, radius, alpha) {
      // Main soft circle
      const gradient = ctx.createRadialGradient(x, y, 0, x, y, radius);
      gradient.addColorStop(0, `rgba(255,255,255,0)`);
      gradient.addColorStop(CONFIG.brushSoftness, `rgba(255,255,255,0)`);
      gradient.addColorStop(1, `rgba(255,255,255,${alpha})`);

      ctx.globalCompositeOperation = 'destination-out';
      ctx.beginPath();
      ctx.arc(x, y, radius, 0, Math.PI * 2);
      ctx.fillStyle = gradient;
      ctx.fill();
    }

    // Draw ink splatter with organic edges
    function drawInkStroke(x, y) {
      const r = CONFIG.brushRadius;

      // Main brush mark — soft erasure
      drawInkDot(x, y, r, 0.65);

      // Smaller sub-dots around the edges (ink splatter effect)
      for (let i = 0; i < CONFIG.inkDots; i++) {
        const angle = Math.random() * Math.PI * 2;
        const dist = r * 0.4 + Math.random() * CONFIG.inkSpread;
        const sx = x + Math.cos(angle) * dist;
        const sy = y + Math.sin(angle) * dist;
        const sr = 4 + Math.random() * 12;
        drawInkDot(sx, sy, sr, 0.3 + Math.random() * 0.3);
      }

      // Extra thin tendrils (water ink bleeding effect)
      for (let i = 0; i < 3; i++) {
        const angle = Math.random() * Math.PI * 2;
        const len = r * 0.6 + Math.random() * r * 0.8;
        const ex = x + Math.cos(angle) * len;
        const ey = y + Math.sin(angle) * len;

        ctx.globalCompositeOperation = 'destination-out';
        ctx.beginPath();
        ctx.moveTo(x + Math.cos(angle) * r * 0.3, y + Math.sin(angle) * r * 0.3);
        ctx.lineTo(ex, ey);
        ctx.lineWidth = 1 + Math.random() * 2;
        ctx.strokeStyle = `rgba(255,255,255,${0.1 + Math.random() * 0.15})`;
        ctx.stroke();
      }
    }

    // Interpolate between previous and current mouse position
    function strokeBetween(x0, y0, x1, y1) {
      const dx = x1 - x0;
      const dy = y1 - y0;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const steps = Math.max(1, Math.floor(dist / (CONFIG.brushRadius * 0.3)));

      for (let i = 0; i <= steps; i++) {
        const t = i / steps;
        const ix = x0 + dx * t;
        const iy = y0 + dy * t;
        drawInkStroke(ix, iy);
      }
    }

    // ========== Fade Back to White ==========

    function fadeToWhite() {
      if (!isFading) return;

      ctx.globalCompositeOperation = 'source-over';

      // Gradually paint semi-transparent white over the entire canvas
      ctx.fillStyle = `rgba(255, 255, 255, ${CONFIG.fadeSpeed / 255})`;
      ctx.fillRect(0, 0, W, H);
    }

    // ========== Decorative Particles ==========
    function spawnParticle(x, y) {
      const el = document.createElement('div');
      el.className = 'ink-particle';
      const size = 10 + Math.random() * 30;
      el.style.width = size + 'px';
      el.style.height = size + 'px';
      el.style.left = (x - size / 2 + (Math.random() - 0.5) * 40) + 'px';
      el.style.top = (y - size / 2 + (Math.random() - 0.5) * 40) + 'px';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 1200);
    }

    // ========== Mouse Events ==========

    document.addEventListener('mousemove', (e) => {
      mouseX = e.clientX;
      mouseY = e.clientY;

      // Update cursor
      cursor.style.left = mouseX + 'px';
      cursor.style.top = mouseY + 'px';
      cursor.classList.add('visible');

      if (!hasInteracted) {
        hasInteracted = true;
        hint.classList.add('hidden');
      }

      // Draw ink stroke
      if (prevX !== -999 && prevY !== -999) {
        strokeBetween(prevX, prevY, mouseX, mouseY);
      } else {
        drawInkStroke(mouseX, mouseY);
      }

      prevX = mouseX;
      prevY = mouseY;

      // Spawn particle
      if (Math.random() < CONFIG.particleChance) {
        spawnParticle(mouseX, mouseY);
      }

      // Reset fade timer
      isMouseInside = true;
      isFading = false;
      lastMoveTime = performance.now();
    });

    document.addEventListener('mouseleave', () => {
      isMouseInside = false;
      cursor.classList.remove('visible');
      prevX = -999;
      prevY = -999;
      // Start fading immediately when mouse leaves
      isFading = true;
    });

    document.addEventListener('mouseenter', () => {
      isMouseInside = true;
      isFading = false;
    });

    // ========== Animation Loop ==========

    function animate(time) {
      // Check inactivity → start fading
      if (isMouseInside && !isFading && lastMoveTime > 0) {
        if (time - lastMoveTime > CONFIG.fadeDelay) {
          isFading = true;
        }
      }

      if (isFading) {
        fadeToWhite();
      }

      requestAnimationFrame(animate);
    }

    requestAnimationFrame(animate);
  </script>
</body>
</html>
