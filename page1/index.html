<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>敦煌水墨</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            cursor: none;
        }
        #bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
        }
        #mask {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
        }
        .hint {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2;
            color: #b8a080;
            font-family: "STKaiti", "KaiTi", "楷体", serif;
            font-size: 16px;
            letter-spacing: 4px;
            opacity: 0.7;
            pointer-events: none;
            transition: opacity 0.8s;
        }
        .hint.hidden { opacity: 0; }
    </style>
</head>
<body>
    <canvas id="bg"></canvas>
    <canvas id="mask"></canvas>
    <div class="hint" id="hint">移动鼠标，拂尘见画</div>

    <script>
    const bgCanvas = document.getElementById('bg');
    const bgCtx = bgCanvas.getContext('2d');
    const maskCanvas = document.getElementById('mask');
    const maskCtx = maskCanvas.getContext('2d');
    const hint = document.getElementById('hint');

    let W, H;

    /* ========== 敦煌色调 ========== */
    const PALETTE = {
        deepRed:    '#8B2500',
        vermillion: '#C84032',
        ochre:      '#C49A6C',
        sand:       '#D4B896',
        cream:      '#E8D5B7',
        mineralBlue:'#2E5F7E',
        azurite:    '#3A7CA5',
        malachite:  '#3B7A57',
        jade:       '#5B9279',
        gold:       '#B8860B',
        darkBrown:  '#3E2723',
        warmWhite:  '#F5E6CC',
    };

    /* ========== 绘制敦煌背景 ========== */
    function drawBackground() {
        // 底色渐变 — 暖沙色调
        const base = bgCtx.createLinearGradient(0, 0, W, H);
        base.addColorStop(0,   '#E8D5B7');
        base.addColorStop(0.25,'#D4B896');
        base.addColorStop(0.5, '#C49A6C');
        base.addColorStop(0.75,'#B8860B');
        base.addColorStop(1,   '#8B6914');
        bgCtx.fillStyle = base;
        bgCtx.fillRect(0, 0, W, H);

        // 大面积色彩渲染
        const blobs = [
            { x: W*0.15, y: H*0.25, r: W*0.35, color: PALETTE.vermillion, alpha: 0.18 },
            { x: W*0.80, y: H*0.20, r: W*0.30, color: PALETTE.mineralBlue, alpha: 0.15 },
            { x: W*0.50, y: H*0.60, r: W*0.40, color: PALETTE.malachite,  alpha: 0.12 },
            { x: W*0.25, y: H*0.80, r: W*0.28, color: PALETTE.azurite,   alpha: 0.14 },
            { x: W*0.75, y: H*0.75, r: W*0.32, color: PALETTE.deepRed,   alpha: 0.16 },
            { x: W*0.50, y: H*0.15, r: W*0.25, color: PALETTE.gold,      alpha: 0.12 },
            { x: W*0.10, y: H*0.55, r: W*0.22, color: PALETTE.jade,      alpha: 0.10 },
            { x: W*0.90, y: H*0.50, r: W*0.20, color: PALETTE.ochre,     alpha: 0.15 },
        ];
        blobs.forEach(b => {
            const g = bgCtx.createRadialGradient(b.x, b.y, 0, b.x, b.y, b.r);
            g.addColorStop(0, hexToRgba(b.color, b.alpha));
            g.addColorStop(1, hexToRgba(b.color, 0));
            bgCtx.fillStyle = g;
            bgCtx.fillRect(0, 0, W, H);
        });

        // 远山轮廓
        drawMountains(H * 0.55, 80, PALETTE.mineralBlue, 0.12);
        drawMountains(H * 0.65, 60, PALETTE.malachite, 0.10);
        drawMountains(H * 0.75, 50, PALETTE.deepRed, 0.08);

        // 祥云纹样
        bgCtx.globalAlpha = 0.06;
        for (let i = 0; i < 12; i++) {
            drawCloud(
                Math.random() * W,
                Math.random() * H * 0.5,
                30 + Math.random() * 60,
                PALETTE.cream
            );
        }
        bgCtx.globalAlpha = 1;

        // 装饰圆环 (敦煌藻井纹样)
        for (let i = 0; i < 6; i++) {
            const cx = W * (0.15 + Math.random() * 0.7);
            const cy = H * (0.15 + Math.random() * 0.7);
            const r  = 40 + Math.random() * 80;
            drawDecorativeRing(cx, cy, r);
        }

        // 莲花纹样
        for (let i = 0; i < 4; i++) {
            const cx = W * (0.2 + Math.random() * 0.6);
            const cy = H * (0.2 + Math.random() * 0.6);
            drawLotus(cx, cy, 25 + Math.random() * 40);
        }

        // 颗粒质感
        addGrain();
    }

    function drawMountains(baseY, amplitude, color, alpha) {
        bgCtx.beginPath();
        bgCtx.moveTo(0, H);
        const segments = 12;
        for (let i = 0; i <= segments; i++) {
            const x = (W / segments) * i;
            const y = baseY + Math.sin(i * 0.8 + Math.random()) * amplitude;
            if (i === 0) bgCtx.lineTo(x, y);
            else {
                const cpx = x - W / segments / 2;
                const cpy = y - amplitude * 0.3 * Math.random();
                bgCtx.quadraticCurveTo(cpx, cpy, x, y);
            }
        }
        bgCtx.lineTo(W, H);
        bgCtx.closePath();
        bgCtx.fillStyle = hexToRgba(color, alpha);
        bgCtx.fill();
    }

    function drawCloud(x, y, size, color) {
        bgCtx.fillStyle = color;
        for (let i = 0; i < 5; i++) {
            bgCtx.beginPath();
            bgCtx.arc(x + i * size * 0.4, y + Math.sin(i * 1.2) * size * 0.15, size * (0.2 + Math.random() * 0.15), 0, Math.PI * 2);
            bgCtx.fill();
        }
    }

    function drawDecorativeRing(cx, cy, r) {
        const colors = [PALETTE.vermillion, PALETTE.gold, PALETTE.mineralBlue, PALETTE.malachite];
        for (let i = 0; i < 3; i++) {
            bgCtx.beginPath();
            bgCtx.arc(cx, cy, r - i * 8, 0, Math.PI * 2);
            bgCtx.strokeStyle = hexToRgba(colors[i % colors.length], 0.08);
            bgCtx.lineWidth = 2;
            bgCtx.stroke();
        }
    }

    function drawLotus(cx, cy, r) {
        const petals = 8;
        bgCtx.save();
        bgCtx.translate(cx, cy);
        for (let i = 0; i < petals; i++) {
            bgCtx.rotate((Math.PI * 2) / petals);
            bgCtx.beginPath();
            bgCtx.ellipse(0, -r * 0.6, r * 0.25, r * 0.55, 0, 0, Math.PI * 2);
            bgCtx.fillStyle = hexToRgba(PALETTE.vermillion, 0.05);
            bgCtx.fill();
            bgCtx.strokeStyle = hexToRgba(PALETTE.gold, 0.06);
            bgCtx.lineWidth = 1;
            bgCtx.stroke();
        }
        bgCtx.restore();
    }

    function addGrain() {
        const imageData = bgCtx.getImageData(0, 0, W, H);
        const data = imageData.data;
        for (let i = 0; i < data.length; i += 4) {
            const noise = (Math.random() - 0.5) * 15;
            data[i]   += noise;
            data[i+1] += noise;
            data[i+2] += noise;
        }
        bgCtx.putImageData(imageData, 0, 0);
    }

    /* ========== 白色遮罩层 ========== */
    function fillMask() {
        maskCtx.globalCompositeOperation = 'source-over';
        maskCtx.globalAlpha = 1;
        maskCtx.fillStyle = '#ffffff';
        maskCtx.fillRect(0, 0, W, H);
    }

    /* ========== 水墨笔刷 ========== */
    function brushReveal(x, y, vx, vy) {
        const speed = Math.sqrt(vx * vx + vy * vy);
        const baseR = 25 + Math.min(speed * 0.6, 50);

        maskCtx.globalCompositeOperation = 'destination-out';

        // 主墨团 — 柔和边缘
        const g1 = maskCtx.createRadialGradient(x, y, 0, x, y, baseR);
        g1.addColorStop(0,   'rgba(0,0,0,0.55)');
        g1.addColorStop(0.3, 'rgba(0,0,0,0.35)');
        g1.addColorStop(0.6, 'rgba(0,0,0,0.15)');
        g1.addColorStop(1,   'rgba(0,0,0,0)');
        maskCtx.globalAlpha = 1;
        maskCtx.fillStyle = g1;
        maskCtx.beginPath();
        maskCtx.arc(x, y, baseR, 0, Math.PI * 2);
        maskCtx.fill();

        // 墨点飞溅
        const splashCount = 3 + Math.floor(speed * 0.15);
        for (let i = 0; i < splashCount; i++) {
            const angle = Math.random() * Math.PI * 2;
            const dist  = baseR * (0.4 + Math.random() * 0.8);
            const sx = x + Math.cos(angle) * dist;
            const sy = y + Math.sin(angle) * dist;
            const sr = 1 + Math.random() * 3;
            maskCtx.globalAlpha = 0.15 + Math.random() * 0.25;
            maskCtx.beginPath();
            maskCtx.arc(sx, sy, sr, 0, Math.PI * 2);
            maskCtx.fill();
        }

        // 飞白效果（速度越快越明显）
        if (speed > 5) {
            const tailLen = Math.min(speed * 1.5, 80);
            const nx = -vx / speed;
            const ny = -vy / speed;
            const g2 = maskCtx.createLinearGradient(x, y, x + nx * tailLen, y + ny * tailLen);
            g2.addColorStop(0, 'rgba(0,0,0,0.2)');
            g2.addColorStop(1, 'rgba(0,0,0,0)');
            maskCtx.globalAlpha = 0.6;
            maskCtx.strokeStyle = g2;
            maskCtx.lineWidth = baseR * 0.6;
            maskCtx.lineCap = 'round';
            maskCtx.beginPath();
            maskCtx.moveTo(x, y);
            maskCtx.lineTo(x + nx * tailLen, y + ny * tailLen);
            maskCtx.stroke();
        }

        maskCtx.globalCompositeOperation = 'source-over';
    }

    /* ========== 交互逻辑 ========== */
    let lastX = 0, lastY = 0;
    let isMoving = false;
    let fadeTimer = null;
    let animId = null;
    let hasInteracted = false;

    function onMove(x, y) {
        if (!hasInteracted) {
            hasInteracted = true;
            hint.classList.add('hidden');
        }

        const vx = x - lastX;
        const vy = y - lastY;

        // 插值补点，避免快速移动时断墨
        const dist = Math.sqrt(vx * vx + vy * vy);
        const steps = Math.max(1, Math.floor(dist / 8));
        for (let i = 1; i <= steps; i++) {
            const t = i / steps;
            brushReveal(lastX + vx * t, lastY + vy * t, vx / steps, vy / steps);
        }

        lastX = x;
        lastY = y;
        isMoving = true;

        clearTimeout(fadeTimer);
        fadeTimer = setTimeout(() => {
            isMoving = false;
        }, 120);
    }

    /* ========== 动画循环 ========== */
    function animate() {
        if (!isMoving) {
            // 鼠标静止/离开 → 白色遮罩逐渐恢复
            maskCtx.globalCompositeOperation = 'source-over';
            maskCtx.globalAlpha = 0.035;
            maskCtx.fillStyle = '#ffffff';
            maskCtx.fillRect(0, 0, W, H);
        }
        animId = requestAnimationFrame(animate);
    }

    /* ========== 事件绑定 ========== */
    maskCanvas.addEventListener('mousemove', e => onMove(e.clientX, e.clientY));
    maskCanvas.addEventListener('mouseleave', () => {
        isMoving = false;
        clearTimeout(fadeTimer);
    });

    // 触屏支持
    let touchLastX = 0, touchLastY = 0;
    maskCanvas.addEventListener('touchstart', e => {
        e.preventDefault();
        const t = e.touches[0];
        touchLastX = t.clientX;
        touchLastY = t.clientY;
    }, { passive: false });
    maskCanvas.addEventListener('touchmove', e => {
        e.preventDefault();
        const t = e.touches[0];
        onMove(t.clientX, t.clientY);
    }, { passive: false });
    maskCanvas.addEventListener('touchend', () => {
        isMoving = false;
    });

    /* ========== 初始化 ========== */
    function resize() {
        W = window.innerWidth;
        H = window.innerHeight;
        bgCanvas.width = W;  bgCanvas.height = H;
        maskCanvas.width = W; maskCanvas.height = H;
        drawBackground();
        fillMask();
    }

    window.addEventListener('resize', () => {
        cancelAnimationFrame(animId);
        resize();
        animate();
    });

    resize();
    animate();

    /* ========== 工具函数 ========== */
    function hexToRgba(hex, alpha) {
        const r = parseInt(hex.slice(1, 3), 16);
        const g = parseInt(hex.slice(3, 5), 16);
        const b = parseInt(hex.slice(5, 7), 16);
        return `rgba(${r},${g},${b},${alpha})`;
    }
    </script>
</body>
</html>
