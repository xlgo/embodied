<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>消息中枢 - System C</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', sans-serif;
    background: linear-gradient(135deg, #1a0a2e 0%, #2d1b4e 50%, #1a1a3e 100%);
    color: #f0e0ff;
    min-height: 100vh;
    padding: 20px;
    overflow-x: hidden;
    transition: background 0.5s, color 0.5s;
    display: flex;
    flex-direction: column;
  }
  body.light {
    background: linear-gradient(135deg, #f8f0ff 0%, #f0e8f8 50%, #ede4f4 100%);
    color: #2d1b4e;
  }
  .header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
  }
  .header .dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #ea80fc;
    box-shadow: 0 0 10px #ea80fc88;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.6; transform: scale(1.3); }
  }
  .header h2 {
    font-size: 16px;
    font-weight: 700;
    background: linear-gradient(90deg, #ea80fc, #ce93d8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: 0.5px;
  }

  .tabs {
    display: flex;
    gap: 2px;
    margin-bottom: 14px;
    background: rgba(234, 128, 252, 0.05);
    border-radius: 10px;
    padding: 3px;
  }
  .tab {
    flex: 1;
    padding: 8px;
    text-align: center;
    font-size: 11px;
    font-weight: 600;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.25s;
    color: #ea80fc88;
  }
  .tab.active {
    background: rgba(234, 128, 252, 0.15);
    color: #ea80fc;
  }
  .tab:hover { color: #ea80fc; }

  .messages {
    flex: 1;
    background: rgba(0,0,0,0.2);
    border: 1px solid rgba(234, 128, 252, 0.1);
    border-radius: 12px;
    padding: 12px;
    overflow-y: auto;
    margin-bottom: 14px;
    max-height: 260px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: #ea80fc33; border-radius: 4px; }

  .msg-bubble {
    padding: 10px 14px;
    border-radius: 12px;
    font-size: 12px;
    max-width: 85%;
    animation: msgIn 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
  }
  .msg-bubble .source {
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 4px;
    opacity: 0.7;
  }
  .msg-bubble .time {
    font-size: 9px;
    opacity: 0.5;
    margin-top: 4px;
  }

  .msg-bubble.from-a {
    background: rgba(124, 77, 255, 0.15);
    border: 1px solid rgba(124, 77, 255, 0.2);
    align-self: flex-start;
    border-bottom-left-radius: 4px;
  }
  .msg-bubble.from-a .source { color: #b388ff; }

  .msg-bubble.from-b {
    background: rgba(0, 229, 255, 0.1);
    border: 1px solid rgba(0, 229, 255, 0.2);
    align-self: flex-end;
    border-bottom-right-radius: 4px;
  }
  .msg-bubble.from-b .source { color: #18ffff; }

  .msg-bubble.from-c {
    background: rgba(234, 128, 252, 0.12);
    border: 1px solid rgba(234, 128, 252, 0.2);
    align-self: center;
    border-bottom-right-radius: 4px;
  }
  .msg-bubble.from-c .source { color: #ea80fc; }

  .msg-bubble.system {
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(255, 255, 255, 0.06);
    align-self: center;
    text-align: center;
    font-size: 10px;
    color: rgba(255,255,255,0.4);
    max-width: 100%;
  }

  @keyframes msgIn {
    from { opacity: 0; transform: translateY(8px) scale(0.96); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .input-area {
    display: flex;
    gap: 8px;
  }
  .input-area input {
    flex: 1;
    padding: 10px 14px;
    border-radius: 10px;
    border: 1px solid rgba(234, 128, 252, 0.15);
    background: rgba(0,0,0,0.3);
    color: #f0e0ff;
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    outline: none;
    transition: border-color 0.25s;
  }
  .input-area input:focus {
    border-color: rgba(234, 128, 252, 0.4);
  }
  .input-area input::placeholder { color: rgba(234, 128, 252, 0.3); }
  .input-area button {
    padding: 10px 18px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(135deg, #ea80fc, #ce93d8);
    color: #1a0a2e;
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.25s;
  }
  .input-area button:hover {
    box-shadow: 0 4px 16px rgba(234, 128, 252, 0.35);
    transform: translateY(-1px);
  }
  .input-area button:active { transform: scale(0.96); }

  .quick-actions {
    display: flex;
    gap: 6px;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }
  .quick-btn {
    padding: 5px 10px;
    border-radius: 20px;
    border: 1px solid rgba(234, 128, 252, 0.15);
    background: transparent;
    color: #ea80fc88;
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .quick-btn:hover {
    border-color: rgba(234, 128, 252, 0.4);
    color: #ea80fc;
    background: rgba(234, 128, 252, 0.08);
  }
</style>
</head>
<body>
  <div class="header">
    <div class="dot"></div>
    <h2>💬 消息中枢 · SYSTEM C</h2>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="setTab(this, 'all')">全部消息</div>
    <div class="tab" onclick="setTab(this, 'A')">System A</div>
    <div class="tab" onclick="setTab(this, 'B')">System B</div>
  </div>

  <div class="messages" id="messages">
    <div class="msg-bubble system">
      <span>系统已就绪 · 等待消息...</span>
    </div>
  </div>

  <div class="quick-actions">
    <button class="quick-btn" onclick="quickSend('ping')">📡 Ping All</button>
    <button class="quick-btn" onclick="quickSend('status')">📋 请求状态</button>
    <button class="quick-btn" onclick="quickSend('hello')">👋 打招呼</button>
    <button class="quick-btn" onclick="quickSend('time')">🕐 同步时间</button>
  </div>

  <div class="input-area">
    <input type="text" id="msgInput" placeholder="输入消息广播到所有系统..." onkeydown="if(event.key==='Enter')sendChat()">
    <button onclick="sendChat()">发送</button>
  </div>

  <script>
    const messagesEl = document.getElementById('messages');
    const msgInput = document.getElementById('msgInput');
    let currentFilter = 'all';
    let allMessages = [];

    function setTab(el, filter) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
      currentFilter = filter;
      renderMessages();
    }

    function addMessage(from, type, content, data = null) {
      const time = new Date().toLocaleTimeString('zh-CN', { hour12: false });
      allMessages.push({ from, type, content, time, data });
      if (allMessages.length > 100) allMessages.shift();
      renderMessages();
    }

    function renderMessages() {
      const filtered = currentFilter === 'all'
        ? allMessages
        : allMessages.filter(m => m.from === currentFilter);

      messagesEl.innerHTML = '';
      if (filtered.length === 0) {
        messagesEl.innerHTML = '<div class="msg-bubble system"><span>暂无消息</span></div>';
        return;
      }
      filtered.forEach(m => {
        const bubble = document.createElement('div');
        bubble.className = `msg-bubble from-${m.from.toLowerCase()}`;
        bubble.innerHTML = `
          <div class="source">System ${m.from} · ${m.type}</div>
          <div>${m.content}</div>
          <div class="time">${m.time}</div>
        `;
        messagesEl.appendChild(bubble);
      });
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function sendMsg(type, payload) {
      window.parent.postMessage({ from: 'C', type, payload }, '*');
    }

    function sendChat() {
      const text = msgInput.value.trim();
      if (!text) return;
      addMessage('C', 'chat_msg', text);
      sendMsg('chat_msg', { text });
      msgInput.value = '';
    }

    function quickSend(action) {
      const msgs = {
        'ping': { type: 'ping', payload: { ts: Date.now() }, text: '📡 Ping 请求已发送' },
        'status': { type: 'request_status', payload: {}, text: '📋 状态查询请求已发送' },
        'hello': { type: 'chat_msg', payload: { text: '你好！来自 System C 的问候 👋' }, text: '👋 你好！来自 System C 的问候' },
        'time': { type: 'sync', payload: { timestamp: Date.now(), source: 'C' }, text: '🕐 时间同步请求已发送' }
      };
      const msg = msgs[action];
      addMessage('C', msg.type, msg.text);
      sendMsg(msg.type, msg.payload);
    }

    window.addEventListener('message', (e) => {
      if (!e.data || !e.data.from || e.data.from === 'C') return;
      const { type, payload, from } = e.data;

      let content = '';
      switch (type) {
        case 'heartbeat':
          content = `💓 心跳信号 · 状态: ${payload.status}`;
          break;
        case 'sync':
          content = `🔄 数据同步请求`;
          break;
        case 'alert':
          content = `🚨 警报 [${payload.level}]: ${payload.text}`;
          break;
        case 'update_chart':
          content = `📊 图表数据更新: ${payload.value}`;
          break;
        case 'theme':
          content = `🎨 主题切换: ${payload.mode}`;
          if (payload.mode === 'light') document.body.classList.add('light');
          else document.body.classList.remove('light');
          break;
        case 'rate_change':
          content = `⚡ 数据流速率调整: ${payload.rate}%`;
          break;
        case 'pong':
          content = `✅ 响应: ${payload.msg}`;
          break;
        case 'status_report':
          content = `📈 状态报告 · CPU: ${payload.cpu} · 内存: ${payload.mem} · 延迟: ${payload.latency}`;
          break;
        case 'ping':
          content = `📡 Ping 请求`;
          sendMsg('pong', { msg: 'Pong from System C!' });
          break;
        case 'chat_msg':
          content = `💬 ${payload.text}`;
          break;
        default:
          content = `[${type}] ${JSON.stringify(payload).substring(0, 80)}`;
      }

      addMessage(from, type, content, payload);
    });
  </script>
</body>
</html>
