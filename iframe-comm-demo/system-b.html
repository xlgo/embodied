<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>数据监控 - System B</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', sans-serif;
    background: linear-gradient(135deg, #0d1b2a 0%, #1b2838 50%, #1a2634 100%);
    color: #e0f0ff;
    min-height: 100vh;
    padding: 20px;
    overflow-x: hidden;
    transition: background 0.5s, color 0.5s;
  }
  body.light {
    background: linear-gradient(135deg, #f0f4f8 0%, #e8eef4 50%, #dfe6ed 100%);
    color: #1a2634;
  }
  .header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
  }
  .header .dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #00e5ff;
    box-shadow: 0 0 10px #00e5ff88;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.6; transform: scale(1.3); }
  }
  .header h2 {
    font-size: 16px;
    font-weight: 700;
    background: linear-gradient(90deg, #00e5ff, #18ffff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: 0.5px;
  }

  .metrics {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 18px;
  }
  .metric-card {
    background: rgba(0, 229, 255, 0.05);
    border: 1px solid rgba(0, 229, 255, 0.12);
    border-radius: 12px;
    padding: 14px;
    transition: all 0.3s;
  }
  .metric-card:hover {
    border-color: rgba(0, 229, 255, 0.3);
    transform: translateY(-1px);
  }
  .metric-card .label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #00e5ff88;
    margin-bottom: 6px;
  }
  .metric-card .value {
    font-size: 22px;
    font-weight: 700;
    color: #00e5ff;
    transition: color 0.3s;
  }
  .metric-card .change {
    font-size: 10px;
    margin-top: 4px;
  }
  .metric-card .change.up { color: #69f0ae; }
  .metric-card .change.down { color: #ff5252; }

  .chart-area {
    background: rgba(0,0,0,0.2);
    border: 1px solid rgba(0, 229, 255, 0.1);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 18px;
    position: relative;
    height: 140px;
  }
  .chart-area .chart-title {
    font-size: 11px;
    color: #00e5ff88;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }
  canvas {
    width: 100% !important;
    height: 100px !important;
  }

  .alert-banner {
    display: none;
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 12px;
    font-weight: 600;
    margin-bottom: 14px;
    animation: slideIn 0.3s ease;
    align-items: center;
    gap: 8px;
  }
  .alert-banner.warning {
    display: flex;
    background: rgba(255, 171, 0, 0.12);
    border: 1px solid rgba(255, 171, 0, 0.3);
    color: #ffab00;
  }
  .alert-banner.error {
    display: flex;
    background: rgba(255, 82, 82, 0.12);
    border: 1px solid rgba(255, 82, 82, 0.3);
    color: #ff5252;
  }
  @keyframes slideIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }

  .rate-indicator {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    background: rgba(0, 229, 255, 0.05);
    border: 1px solid rgba(0, 229, 255, 0.1);
    border-radius: 10px;
    font-size: 12px;
  }
  .rate-bar {
    flex: 1;
    height: 4px;
    background: rgba(0, 229, 255, 0.1);
    border-radius: 4px;
    overflow: hidden;
  }
  .rate-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #00e5ff, #18ffff);
    border-radius: 4px;
    transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    width: 50%;
  }
</style>
</head>
<body>
  <div class="header">
    <div class="dot"></div>
    <h2>📊 数据监控 · SYSTEM B</h2>
  </div>

  <div id="alertBanner" class="alert-banner"></div>

  <div class="metrics">
    <div class="metric-card">
      <div class="label">CPU 使用率</div>
      <div class="value" id="cpu">42%</div>
      <div class="change up">↑ 3.2%</div>
    </div>
    <div class="metric-card">
      <div class="label">内存占用</div>
      <div class="value" id="mem">67%</div>
      <div class="change down">↓ 1.8%</div>
    </div>
    <div class="metric-card">
      <div class="label">网络延迟</div>
      <div class="value" id="latency">12ms</div>
      <div class="change up">↑ 0.5ms</div>
    </div>
    <div class="metric-card">
      <div class="label">吞吐量</div>
      <div class="value" id="throughput">1.2K</div>
      <div class="change up">↑ 156/s</div>
    </div>
  </div>

  <div class="chart-area">
    <div class="chart-title">实时数据流</div>
    <canvas id="chart"></canvas>
  </div>

  <div class="rate-indicator">
    <span style="color: #00e5ff88;">数据流速率</span>
    <div class="rate-bar"><div class="rate-bar-fill" id="rateBar"></div></div>
    <span id="rateLabel" style="color: #00e5ff;">50%</span>
  </div>

  <script>
    // Mini chart
    const canvas = document.getElementById('chart');
    const ctx = canvas.getContext('2d');
    let dataPoints = Array.from({length: 40}, () => Math.random() * 60 + 20);

    function drawChart() {
      canvas.width = canvas.offsetWidth * 2;
      canvas.height = 200;
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Gradient fill
      const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
      gradient.addColorStop(0, 'rgba(0, 229, 255, 0.2)');
      gradient.addColorStop(1, 'rgba(0, 229, 255, 0)');

      const step = canvas.width / (dataPoints.length - 1);

      // Fill area
      ctx.beginPath();
      ctx.moveTo(0, canvas.height);
      dataPoints.forEach((v, i) => {
        const x = i * step;
        const y = canvas.height - (v / 100) * canvas.height;
        if (i === 0) ctx.lineTo(x, y);
        else {
          const prevX = (i - 1) * step;
          const prevY = canvas.height - (dataPoints[i - 1] / 100) * canvas.height;
          const cpX = (prevX + x) / 2;
          ctx.bezierCurveTo(cpX, prevY, cpX, y, x, y);
        }
      });
      ctx.lineTo(canvas.width, canvas.height);
      ctx.fillStyle = gradient;
      ctx.fill();

      // Line
      ctx.beginPath();
      dataPoints.forEach((v, i) => {
        const x = i * step;
        const y = canvas.height - (v / 100) * canvas.height;
        if (i === 0) ctx.moveTo(x, y);
        else {
          const prevX = (i - 1) * step;
          const prevY = canvas.height - (dataPoints[i - 1] / 100) * canvas.height;
          const cpX = (prevX + x) / 2;
          ctx.bezierCurveTo(cpX, prevY, cpX, y, x, y);
        }
      });
      ctx.strokeStyle = '#00e5ff';
      ctx.lineWidth = 2;
      ctx.stroke();

      // Glow dot at end
      const lastX = (dataPoints.length - 1) * step;
      const lastY = canvas.height - (dataPoints[dataPoints.length - 1] / 100) * canvas.height;
      ctx.beginPath();
      ctx.arc(lastX, lastY, 4, 0, Math.PI * 2);
      ctx.fillStyle = '#00e5ff';
      ctx.fill();
      ctx.beginPath();
      ctx.arc(lastX, lastY, 8, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(0, 229, 255, 0.2)';
      ctx.fill();
    }

    function updateData() {
      dataPoints.shift();
      dataPoints.push(Math.random() * 60 + 20);
      drawChart();

      // Update metrics with small variations
      document.getElementById('cpu').textContent = (38 + Math.random() * 20).toFixed(0) + '%';
      document.getElementById('mem').textContent = (60 + Math.random() * 15).toFixed(0) + '%';
      document.getElementById('latency').textContent = (8 + Math.random() * 10).toFixed(0) + 'ms';
      document.getElementById('throughput').textContent = (0.8 + Math.random() * 1).toFixed(1) + 'K';
    }

    drawChart();
    setInterval(updateData, 1500);

    function sendMsg(type, payload) {
      window.parent.postMessage({ from: 'B', type, payload }, '*');
    }

    window.addEventListener('message', (e) => {
      if (!e.data || !e.data.from || e.data.from === 'B') return;
      const { type, payload, from } = e.data;

      switch (type) {
        case 'sync':
          // Flash all metric cards
          document.querySelectorAll('.metric-card').forEach(card => {
            card.style.borderColor = 'rgba(0, 229, 255, 0.5)';
            card.style.boxShadow = '0 0 15px rgba(0, 229, 255, 0.15)';
            setTimeout(() => {
              card.style.borderColor = 'rgba(0, 229, 255, 0.12)';
              card.style.boxShadow = 'none';
            }, 1000);
          });
          sendMsg('pong', { msg: '数据已同步' });
          break;

        case 'alert':
          const banner = document.getElementById('alertBanner');
          banner.className = `alert-banner ${payload.level === 'warning' ? 'warning' : 'error'}`;
          banner.innerHTML = `⚠️ 来自 System ${from}: ${payload.text}`;
          banner.style.display = 'flex';
          setTimeout(() => banner.style.display = 'none', 4000);
          sendMsg('pong', { msg: '警报已接收' });
          break;

        case 'update_chart':
          if (payload.value !== undefined) {
            dataPoints.push(payload.value);
            dataPoints.shift();
            drawChart();
          }
          sendMsg('pong', { msg: '图表已更新' });
          break;

        case 'rate_change':
          document.getElementById('rateBar').style.width = payload.rate + '%';
          document.getElementById('rateLabel').textContent = payload.rate + '%';
          break;

        case 'theme':
          if (payload.mode === 'light') document.body.classList.add('light');
          else document.body.classList.remove('light');
          break;

        case 'chat_msg':
          // System C sent a chat message to us
          sendMsg('pong', { msg: `收到消息: "${payload.text}"` });
          break;
      }
    });

    // Report status periodically
    setInterval(() => {
      sendMsg('status_report', {
        cpu: document.getElementById('cpu').textContent,
        mem: document.getElementById('mem').textContent,
        latency: document.getElementById('latency').textContent
      });
    }, 5000);
  </script>
</body>
</html>
